<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RailConnect - Reservation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
    <h2><i class="fa-solid fa-train"></i> RailConnect</h2>

    <ul>
        <li><a href="reservation.html">Reservation</a></li>
        <li><a href="cancellation.html">Cancellation</a></li>
        <li><a href="index.html">Logout</a></li>
    </ul>
</nav>

<div class="form-container fade">

    <h2>🚆 Train Ticket Reservation</h2>

    <form id="reservationForm">

        <div class="row">

            <div class="form-group">
                <label>Passenger Name</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" required>
            </div>

            <div class="form-group">
                <label>Gender</label>

                <select id="gender" required>
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel"
                       id="mobile"
                       maxlength="10"
                       required>
            </div>

            <div class="form-group">
                <label>Train Number</label>
                <input type="text" id="trainNo" required>
            </div>

            <div class="form-group">
                <label>Train Name</label>
                <input type="text" id="trainName" required>
            </div>

            <div class="form-group">
                <label>From</label>
                <input type="text" id="from" required>
            </div>

            <div class="form-group">
                <label>To</label>
                <input type="text" id="to" required>
            </div>

            <div class="form-group">
                <label>Journey Date</label>
                <input type="date"
                       id="date"
                       required>
            </div>

            <div class="form-group">
                <label>Class</label>

                <select id="class" required>

                    <option value="">Select</option>
                    <option>Sleeper</option>
                    <option>3A</option>
                    <option>2A</option>
                    <option>1A</option>
                    <option>Chair Car</option>

                </select>
            </div>

        </div>

        <br>

        <button class="btn" type="submit">
            <i class="fa-solid fa-ticket"></i>
            Book Ticket
        </button>

    </form>

    <br>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
